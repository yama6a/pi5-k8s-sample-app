version: "2"
linters:
  enable:
    - bodyclose
    - contextcheck
    - errorlint
    - gocritic
    - gosec
    - misspell
    - noctx
    - nolintlint
    - paralleltest
    - revive
    - rowserrcheck
    - sqlclosecheck
    - testifylint
    - unconvert
    - usestdlibvars
    - wrapcheck
  settings:
    gosec:
      excludes:
        - G101 # DSN template has a %s placeholder, not a real credential
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: api/
        linters:
          - revive
        text: var-naming
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
